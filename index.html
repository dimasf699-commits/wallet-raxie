<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Uang di Kepalamu 💸</title>
<script defer src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;700;900&display=swap');

:root {
  --green:    #00c853;
  --green-dk: #007c33;
  --yellow:   #ffd600;
  --dark:     #0d1117;
  --card:     #161b22;
  --border:   rgba(0,200,83,0.3);
  --text:     #e6edf3;
  --muted:    #8b949e;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  min-height: 100vh;
  background: var(--dark);
  color: var(--text);
  font-family: 'Nunito', sans-serif;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 20px 16px 40px;
  position: relative;
  overflow-x: hidden;
}

/* ── Animated BG ── */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background:
    radial-gradient(ellipse 60% 40% at 20% 10%, rgba(0,200,83,.12) 0%, transparent 70%),
    radial-gradient(ellipse 50% 50% at 80% 90%, rgba(255,214,0,.08) 0%, transparent 70%);
  pointer-events: none;
  z-index: 0;
}

/* ── Floating coins BG ── */
.coin-bg { position:fixed; pointer-events:none; z-index:0; font-size:1.4rem; animation: floatUp linear infinite; opacity:0.15; }
@keyframes floatUp {
  0%   { transform: translateY(110vh) rotate(0deg);   opacity:0; }
  10%  { opacity: 0.15; }
  90%  { opacity: 0.15; }
  100% { transform: translateY(-10vh) rotate(360deg); opacity:0; }
}

/* ── Header ── */
.header {
  position: relative; z-index:1;
  text-align: center;
  margin-bottom: 24px;
}
.header-emoji { font-size: 3rem; display:block; animation: bounce 2s ease-in-out infinite; }
@keyframes bounce {
  0%,100% { transform: translateY(0); }
  50%      { transform: translateY(-10px); }
}
h1 {
  font-family: 'Fredoka One', cursive;
  font-size: clamp(1.8rem, 6vw, 3rem);
  background: linear-gradient(135deg, var(--green) 0%, var(--yellow) 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  line-height: 1.1;
  margin-bottom: 6px;
}
.subtitle {
  color: var(--muted);
  font-size: .95rem;
  font-weight: 600;
}

/* ── Camera wrapper ── */
.cam-wrap {
  position: relative; z-index:1;
  width: 100%;
  max-width: 480px;
  margin-bottom: 20px;
}

.cam-frame {
  position: relative;
  width: 100%;
  aspect-ratio: 4/3;
  background: var(--card);
  border-radius: 24px;
  overflow: hidden;
  border: 2px solid var(--border);
  box-shadow: 0 0 0 1px rgba(0,200,83,.1), 0 20px 60px rgba(0,0,0,.6);
}

/* corner decorations */
.cam-frame::before, .cam-frame::after,
.cam-inner::before, .cam-inner::after {
  content:'';
  position:absolute;
  width:20px; height:20px;
  border-color: var(--green);
  border-style: solid;
  z-index:10;
  pointer-events:none;
}
.cam-frame::before  { top:10px;    left:10px;  border-width:2px 0 0 2px; border-radius:4px 0 0 0; }
.cam-frame::after   { top:10px;    right:10px; border-width:2px 2px 0 0; border-radius:0 4px 0 0; }
.cam-inner::before  { bottom:10px; left:10px;  border-width:0 0 2px 2px; border-radius:0 0 0 4px; }
.cam-inner::after   { bottom:10px; right:10px; border-width:0 2px 2px 0; border-radius:0 0 4px 0; }

#video, #overlay {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
}
#overlay { z-index: 5; }

/* idle / loading state */
.overlay-state {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 12px;
  z-index: 6;
  background: rgba(13,17,23,.9);
  backdrop-filter: blur(4px);
}
.state-icon { font-size: 3rem; animation: pulse 2s ease-in-out infinite; }
@keyframes pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.15)} }
.state-text { color: var(--muted); font-weight:700; font-size:.95rem; text-align:center; padding:0 20px; }

/* spinner */
.spinner {
  width:48px; height:48px;
  border: 4px solid rgba(0,200,83,.2);
  border-top-color: var(--green);
  border-radius: 50%;
  animation: spin .8s linear infinite;
}
@keyframes spin { to { transform:rotate(360deg); } }

/* ── Nominal badge ── */
.nominal-box {
  position: relative; z-index:1;
  width:100%; max-width:480px;
  background: var(--card);
  border: 2px solid var(--border);
  border-radius: 20px;
  padding: 18px 24px;
  display:flex; align-items:center; justify-content:space-between;
  margin-bottom: 20px;
  opacity:0;
  transform: translateY(12px);
  transition: opacity .4s ease, transform .4s ease;
  box-shadow: 0 4px 24px rgba(0,200,83,.1);
}
.nominal-box.show { opacity:1; transform:translateY(0); }
.nominal-label { color:var(--muted); font-size:.85rem; font-weight:700; letter-spacing:.05em; text-transform:uppercase; }
.nominal-value {
  font-family: 'Fredoka One', cursive;
  font-size: clamp(1.4rem, 5vw, 2rem);
  background: linear-gradient(135deg, var(--green), var(--yellow));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

/* ── Buttons ── */
.btn-group {
  position:relative; z-index:1;
  display:flex; gap:12px; flex-wrap:wrap; justify-content:center;
  margin-bottom: 24px;
}
.btn {
  font-family:'Nunito',sans-serif;
  font-weight:900;
  font-size:1rem;
  padding:14px 28px;
  border-radius:50px;
  border:none;
  cursor:pointer;
  display:flex; align-items:center; gap:8px;
  transition: transform .15s ease, box-shadow .15s ease, opacity .15s;
  position:relative;
  overflow:hidden;
}
.btn:active { transform: scale(.96); }
.btn:disabled { opacity:.4; cursor:not-allowed; }

.btn-activate {
  background: linear-gradient(135deg, var(--green), var(--green-dk));
  color:#fff;
  box-shadow: 0 4px 20px rgba(0,200,83,.4);
}
.btn-activate:hover:not(:disabled) { transform:translateY(-2px); box-shadow:0 8px 28px rgba(0,200,83,.5); }

.btn-start {
  background: linear-gradient(135deg, var(--yellow), #ffab00);
  color:#111;
  box-shadow: 0 4px 20px rgba(255,214,0,.35);
}
.btn-start:hover:not(:disabled) { transform:translateY(-2px); box-shadow:0 8px 28px rgba(255,214,0,.5); }

.btn-stop {
  background: var(--card);
  color: var(--text);
  border: 2px solid var(--border);
}
.btn-stop:hover:not(:disabled) { background:#1f2937; }

.btn .icon { font-size:1.2rem; }

/* ── Error box ── */
.error-box {
  position:relative; z-index:1;
  width:100%; max-width:480px;
  background: rgba(255,61,0,.12);
  border:2px solid rgba(255,61,0,.4);
  border-radius:16px;
  padding:16px 20px;
  display:none;
  align-items:center;
  gap:12px;
  margin-bottom:20px;
  color: #ff6e40;
  font-weight:700;
}
.error-box.show { display:flex; }

/* ── Tips ── */
.tips {
  position:relative; z-index:1;
  max-width:480px;
  text-align:center;
  color:var(--muted);
  font-size:.88rem;
  line-height:1.6;
}
.tips strong { color: var(--text); }

/* ── Ripple shimmer on canvas ── */
@keyframes shimmer {
  0%   { filter: drop-shadow(0 0 6px rgba(255,214,0,.4)); }
  50%  { filter: drop-shadow(0 0 18px rgba(255,214,0,.9)); }
  100% { filter: drop-shadow(0 0 6px rgba(255,214,0,.4)); }
}
.glow { animation: shimmer 1.5s ease-in-out infinite; }

/* mobile */
@media(max-width:480px){
  body { padding:16px 12px 32px; }
}
</style>
</head>
<body>

<!-- Floating coin background (generated by JS) -->

<div class="header">
  <span class="header-emoji">💸</span>
  <h1>Berapa Uangmu?</h1>
  <p class="subtitle">Biarkan kamera menilai rezekimu hari ini</p>
</div>

<div class="cam-wrap">
  <div class="cam-frame" id="camFrame">
    <div class="cam-inner" id="camInner"></div>
    <video id="video" autoplay muted playsinline></video>
    <canvas id="overlay"></canvas>

    <!-- idle -->
    <div class="overlay-state" id="stateIdle">
      <div class="state-icon">📷</div>
      <p class="state-text">Kamera belum aktif.<br>Tekan tombol di bawah untuk mulai.</p>
    </div>

    <!-- loading models -->
    <div class="overlay-state" id="stateLoading" style="display:none">
      <div class="spinner"></div>
      <p class="state-text" id="loadingMsg">Memuat model deteksi wajah…</p>
    </div>
  </div>
</div>

<!-- Nominal -->
<div class="nominal-box" id="nominalBox">
  <span class="nominal-label">Rezekimu hari ini</span>
  <span class="nominal-value" id="nominalVal">—</span>
</div>

<!-- Buttons -->
<div class="btn-group">
  <button class="btn btn-activate" id="btnActivate">
    <span class="icon">📷</span> Aktifkan Kamera
  </button>
  <button class="btn btn-start" id="btnStart" style="display:none">
    <span class="icon">✨</span> Mulai
  </button>
  <button class="btn btn-stop" id="btnStop" style="display:none">
    <span class="icon">⏹</span> Berhenti
  </button>
</div>

<!-- Error -->
<div class="error-box" id="errorBox">
  <span style="font-size:1.4rem">🚫</span>
  <span id="errorMsg">Kamera tidak dapat diakses.</span>
</div>

<!-- Tips -->
<p class="tips">
  💡 Hadapkan wajahmu ke kamera, lalu tekan <strong>Mulai</strong>.<br>
  Nominal uang akan muncul di atas kepalamu!
</p>

<script>
/* ================================================================
   CONFIG
   ================================================================ */
const MODEL_URL = 'https://cdn.jsdelivr.net/npm/@vladmandic/face-api/model';

// Probability weights (total = 100)
const NOMINALS = [
  { label: 'Rp 5.000',  value:  5000, weight: 45 },
  { label: 'Rp 10.000', value: 10000, weight: 30 },
  { label: 'Rp 20.000', value: 20000, weight: 24 },
  { label: 'Rp 50.000', value: 50000, weight:  1 },
];

/* ================================================================
   STATE
   ================================================================ */
let stream      = null;
let running     = false;
let animFrame   = null;
let currentNominal = null;
let moneyImg    = null;
let moneyAnim   = { scale: 0, opacity: 0, bounceT: 0 };
let modelsLoaded = false;

/* ================================================================
   ELEMENTS
   ================================================================ */
const video      = document.getElementById('video');
const overlay    = document.getElementById('overlay');
const ctx        = overlay.getContext('2d');
const stateIdle  = document.getElementById('stateIdle');
const stateLoad  = document.getElementById('stateLoading');
const loadingMsg = document.getElementById('loadingMsg');
const nominalBox = document.getElementById('nominalBox');
const nominalVal = document.getElementById('nominalVal');
const btnActivate= document.getElementById('btnActivate');
const btnStart   = document.getElementById('btnStart');
const btnStop    = document.getElementById('btnStop');
const errorBox   = document.getElementById('errorBox');
const errorMsg   = document.getElementById('errorMsg');

/* ================================================================
   FLOATING COIN BACKGROUND
   ================================================================ */
(function spawnCoins(){
  const emojis = ['💵','💴','💶','💷','🪙','💰','💸'];
  for(let i=0;i<12;i++){
    const el = document.createElement('div');
    el.className = 'coin-bg';
    el.textContent = emojis[Math.floor(Math.random()*emojis.length)];
    el.style.left = Math.random()*100 + 'vw';
    el.style.animationDuration = (8+Math.random()*14) + 's';
    el.style.animationDelay    = (Math.random()*12) + 's';
    el.style.fontSize           = (1+Math.random()*1.5) + 'rem';
    document.body.appendChild(el);
  }
})();

/* ================================================================
   WEIGHTED RANDOM NOMINAL
   ================================================================ */
function pickNominal(){
  const total = NOMINALS.reduce((s,n)=>s+n.weight,0);
  let r = Math.random()*total;
  for(const n of NOMINALS){ r-=n.weight; if(r<=0) return n; }
  return NOMINALS[0];
}

/* ================================================================
   DRAW MONEY IMAGE ON CANVAS
   ================================================================ */
function buildMoneyImage(nominal){
  const W=320, H=140;
  const mc=document.createElement('canvas');
  mc.width=W; mc.height=H;
  const cx=mc.getContext('2d');

  // determine color per nominal
  const colors = {
    5000:  { bg:'#8B4513', text:'#F5DEB3', accent:'#D2691E' },
    10000: { bg:'#4A1942', text:'#E8C4E8', accent:'#8B2FC9' },
    20000: { bg:'#1a472a', text:'#90EE90', accent:'#2d8a4e' },
    50000: { bg:'#7B0D1E', text:'#FFD700', accent:'#C41E3A' },
  };
  const col = colors[nominal.value] || colors[5000];

  // shadow
  cx.shadowColor='rgba(0,0,0,.6)';
  cx.shadowBlur=18;

  // card body
  const r=18;
  cx.beginPath();
  cx.moveTo(r,0); cx.lineTo(W-r,0);
  cx.quadraticCurveTo(W,0,W,r);
  cx.lineTo(W,H-r);
  cx.quadraticCurveTo(W,H,W-r,H);
  cx.lineTo(r,H);
  cx.quadraticCurveTo(0,H,0,H-r);
  cx.lineTo(0,r);
  cx.quadraticCurveTo(0,0,r,0);
  cx.closePath();

  const grad=cx.createLinearGradient(0,0,W,H);
  grad.addColorStop(0, col.bg);
  grad.addColorStop(1, col.accent);
  cx.fillStyle=grad;
  cx.fill();

  // inner border
  cx.shadowBlur=0;
  cx.strokeStyle=col.text+'55';
  cx.lineWidth=2;
  cx.beginPath();
  cx.roundRect(6,6,W-12,H-12,12);
  cx.stroke();

  // watermark circles
  cx.globalAlpha=0.12;
  for(let i=0;i<5;i++){
    cx.beginPath();
    cx.arc(40+i*60,H/2,30,0,Math.PI*2);
    cx.strokeStyle=col.text;
    cx.lineWidth=3;
    cx.stroke();
  }
  cx.globalAlpha=1;

  // Garuda emoji placeholder (text)
  cx.font='bold 30px serif';
  cx.fillStyle=col.text+'cc';
  cx.fillText('🦅',18,48);

  // BANK INDONESIA text
  cx.font='bold 11px sans-serif';
  cx.fillStyle=col.text+'bb';
  cx.letterSpacing='2px';
  cx.fillText('BANK INDONESIA', 58, 32);

  // Nominal text
  cx.font='bold 38px "Fredoka One", cursive, sans-serif';
  cx.fillStyle=col.text;
  cx.shadowColor='rgba(0,0,0,.4)';
  cx.shadowBlur=6;
  cx.fillText(nominal.label, 18, 90);
  cx.shadowBlur=0;

  // small decoration dots
  for(let i=0;i<6;i++){
    cx.beginPath();
    cx.arc(W-30, 20+i*18, 3, 0, Math.PI*2);
    cx.fillStyle=col.text+'66';
    cx.fill();
  }

  // SERI text bottom right
  cx.font='10px monospace';
  cx.fillStyle=col.text+'88';
  cx.fillText('MH 000000 XX', W-130, H-14);

  const img=new Image();
  img.src=mc.toDataURL();
  return img;
}

/* ================================================================
   RESIZE CANVAS TO VIDEO
   ================================================================ */
function resizeCanvas(){
  overlay.width  = video.videoWidth  || overlay.offsetWidth;
  overlay.height = video.videoHeight || overlay.offsetHeight;
}

/* ================================================================
   LOAD FACE-API MODELS
   ================================================================ */
async function loadModels(){
  stateLoad.style.display='flex';
  stateIdle.style.display='none';
  try {
    loadingMsg.textContent='Memuat model TinyFaceDetector…';
    await faceapi.nets.tinyFaceDetector.loadFromUri(MODEL_URL);
    loadingMsg.textContent='Memuat model landmark wajah…';
    await faceapi.nets.faceLandmark68TinyNet.loadFromUri(MODEL_URL);
    modelsLoaded=true;
    stateLoad.style.display='none';
  } catch(e){
    showError('Gagal memuat model AI. Periksa koneksi internet Anda.');
    stateLoad.style.display='none';
  }
}

/* ================================================================
   START CAMERA
   ================================================================ */
async function activateCamera(){
  btnActivate.disabled=true;
  hideError();

  try {
    stream = await navigator.mediaDevices.getUserMedia({
      video:{ facingMode:'user', width:{ideal:640}, height:{ideal:480} },
      audio:false
    });
    video.srcObject=stream;
    await new Promise(res=>{ video.onloadedmetadata=res; });
    resizeCanvas();

    // load models (show loading overlay while camera runs)
    if(!modelsLoaded) await loadModels();

    if(modelsLoaded){
      stateIdle.style.display='none';
      btnStart.style.display='flex';
      btnActivate.style.display='none';
    } else {
      btnActivate.disabled=false;
    }

  } catch(e){
    btnActivate.disabled=false;
    if(e.name==='NotAllowedError'||e.name==='PermissionDeniedError')
      showError('Izin kamera ditolak. Silakan izinkan akses kamera di pengaturan browser.');
    else if(e.name==='NotFoundError')
      showError('Kamera tidak ditemukan di perangkat ini.');
    else
      showError('Kamera tidak dapat diakses: '+e.message);
  }
}

/* ================================================================
   DETECTION LOOP
   ================================================================ */
async function detectionLoop(){
  if(!running) return;
  if(video.readyState!==4){ animFrame=requestAnimationFrame(detectionLoop); return; }

  resizeCanvas();
  ctx.clearRect(0,0,overlay.width,overlay.height);

  try {
    const det = await faceapi
      .detectSingleFace(video, new faceapi.TinyFaceDetectorOptions({ inputSize:224, scoreThreshold:.4 }))
      .withFaceLandmarks(true);

    if(det && moneyImg && moneyImg.complete){
      const box = det.detection.box;

      // Animate in
      moneyAnim.bounceT += 0.06;
      if(moneyAnim.scale < 1)    moneyAnim.scale   = Math.min(1, moneyAnim.scale+0.06);
      if(moneyAnim.opacity < 1)  moneyAnim.opacity = Math.min(1, moneyAnim.opacity+0.05);

      const bounce  = Math.sin(moneyAnim.bounceT)*5;
      const mW      = Math.max(box.width*1.4, 200);
      const mH      = mW*(140/320);
      const mX      = box.x + box.width/2 - mW/2;
      const mY      = box.y - mH + bounce - 14;

      ctx.save();
      ctx.globalAlpha = moneyAnim.opacity;

      // glow
      ctx.shadowColor  = '#FFD600';
      ctx.shadowBlur   = 18 + Math.sin(moneyAnim.bounceT*1.5)*8;

      // scale from center
      const cx2 = mX + mW/2, cy2 = mY + mH/2;
      ctx.translate(cx2, cy2);
      ctx.scale(moneyAnim.scale, moneyAnim.scale);
      ctx.translate(-cx2,-cy2);

      ctx.drawImage(moneyImg, mX, mY, mW, mH);
      ctx.restore();

      // face box subtle indicator
      ctx.save();
      ctx.strokeStyle='rgba(0,200,83,.35)';
      ctx.lineWidth=2;
      ctx.setLineDash([6,4]);
      ctx.strokeRect(box.x, box.y, box.width, box.height);
      ctx.restore();
    }
  } catch(_){}

  animFrame=requestAnimationFrame(detectionLoop);
}

/* ================================================================
   START / STOP
   ================================================================ */
function startDetection(){
  currentNominal = pickNominal();
  moneyImg       = buildMoneyImage(currentNominal);
  moneyAnim      = { scale:0, opacity:0, bounceT:0 };

  nominalVal.textContent = currentNominal.label;
  nominalBox.classList.add('show');

  running   = true;
  btnStart.style.display='none';
  btnStop.style.display='flex';

  detectionLoop();
}

function stopDetection(){
  running=false;
  cancelAnimationFrame(animFrame);
  ctx.clearRect(0,0,overlay.width,overlay.height);

  btnStop.style.display='none';
  btnStart.style.display='flex';
  nominalBox.classList.remove('show');
}

/* ================================================================
   ERROR HELPERS
   ================================================================ */
function showError(msg){ errorMsg.textContent=msg; errorBox.classList.add('show'); }
function hideError()   { errorBox.classList.remove('show'); }

/* ================================================================
   EVENT LISTENERS
   ================================================================ */
btnActivate.addEventListener('click', activateCamera);
btnStart.addEventListener('click',    startDetection);
btnStop.addEventListener('click',     stopDetection);

// Handle video resize
window.addEventListener('resize', resizeCanvas);

/* ================================================================
   CHECK BROWSER SUPPORT
   ================================================================ */
if(!navigator.mediaDevices?.getUserMedia){
  showError('Browser ini tidak mendukung akses kamera. Coba Chrome atau Firefox terbaru.');
  btnActivate.disabled=true;
}
</script>
</body>
</html>
