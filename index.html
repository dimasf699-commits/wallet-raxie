<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Foto Fuzzle</title>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4.1646424915/hands.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils@0.3.1640029074/camera_utils.js" crossorigin="anonymous"></script>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@300;400;500&family=Instrument+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --ink:#0a0a0f;--paper:#f0ede8;--cyan:#00f5c4;--magenta:#ff2d78;
  --violet:#7c5cff;--amber:#ffb340;--green:#00e676;
  --cyan-dim:rgba(0,245,196,.15);--mag-dim:rgba(255,45,120,.15);
  --white:rgba(255,255,255,.9);--mono:'DM Mono',monospace;
  --display:'Bebas Neue',sans-serif;--body:'Instrument Sans',sans-serif;
}
html,body{width:100%;height:100%;overflow:hidden;background:var(--ink)}
body{font-family:var(--body);color:var(--white)}
#app{position:relative;width:100vw;height:100vh}
#vid{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;transform:scaleX(-1);opacity:0;transition:opacity .6s}
#vid.live{opacity:1}
#overlayCanvas{position:absolute;inset:0;width:100%;height:100%;pointer-events:none;z-index:10}
#trailCanvas{position:absolute;inset:0;width:100%;height:100%;pointer-events:none;z-index:15}
#photoCanvas{display:none}
.screen{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;transition:opacity .4s,visibility .4s}
.screen.off{opacity:0;visibility:hidden;pointer-events:none}
#bootScreen{z-index:90;background:var(--ink);gap:20px}
#bootScreen canvas{position:absolute;inset:0}
.boot-logo{position:relative;z-index:2;text-align:center}
.boot-logo h1{font-family:var(--display);font-size:clamp(4rem,14vw,9rem);letter-spacing:.04em;line-height:.9;background:linear-gradient(135deg,var(--cyan) 0%,var(--violet) 50%,var(--magenta) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;filter:drop-shadow(0 0 60px rgba(0,245,196,.3))}
.boot-logo .sub{font-family:var(--mono);font-size:.7rem;letter-spacing:.4em;color:rgba(255,255,255,.25);text-transform:uppercase;margin-top:12px;display:block}
.boot-status{position:relative;z-index:2;font-family:var(--mono);font-size:.72rem;letter-spacing:.18em;color:rgba(255,255,255,.3);text-transform:uppercase}
.boot-bar{position:relative;z-index:2;width:200px;height:1px;background:rgba(255,255,255,.06);overflow:hidden}
.boot-bar-fill{height:100%;width:0;background:linear-gradient(90deg,var(--cyan),var(--violet));transition:width .4s}
.boot-err{position:relative;z-index:2;font-family:var(--mono);font-size:.68rem;color:var(--magenta);letter-spacing:.1em;text-align:center;max-width:320px;line-height:1.8;display:none}
#cameraHud{z-index:20;background:transparent;pointer-events:none}
.corner{position:absolute;width:36px;height:36px;pointer-events:none}
.corner::before,.corner::after{content:'';position:absolute;transition:background .3s}
.corner::before{width:100%;height:2px;background:rgba(255,255,255,.2)}
.corner::after{width:2px;height:100%;background:rgba(255,255,255,.2)}
.corner.tl{top:28px;left:28px}.corner.tl::before{top:0;left:0}.corner.tl::after{top:0;left:0}
.corner.tr{top:28px;right:28px}.corner.tr::before{top:0;right:0}.corner.tr::after{top:0;right:0}
.corner.bl{bottom:28px;left:28px}.corner.bl::before{bottom:0;left:0}.corner.bl::after{bottom:0;left:0}
.corner.br{bottom:28px;right:28px}.corner.br::before{bottom:0;right:0}.corner.br::after{bottom:0;right:0}
.corner.active::before,.corner.active::after{background:var(--cyan)}
#hudBadge{position:absolute;top:28px;left:50%;transform:translateX(-50%);background:rgba(10,10,15,.8);border:1px solid rgba(255,255,255,.1);border-radius:3px;padding:10px 28px;font-family:var(--mono);font-size:.72rem;letter-spacing:.18em;color:rgba(255,255,255,.45);backdrop-filter:blur(20px);text-transform:uppercase;white-space:nowrap;transition:color .3s,border-color .3s,background .3s;z-index:30;pointer-events:none}
#hudBadge.detected{color:var(--cyan);border-color:rgba(0,245,196,.4);background:rgba(0,245,196,.06)}
#hudBadge.counting{color:var(--amber);border-color:rgba(255,179,64,.4);background:rgba(255,179,64,.06)}
#handIndicator{position:absolute;bottom:100px;left:50%;transform:translateX(-50%);display:flex;flex-direction:column;align-items:center;gap:16px;transition:opacity .4s}
#handIndicator.hidden{opacity:0;pointer-events:none}
#handIcon{width:72px;height:72px;border-radius:50%;border:2px solid rgba(255,255,255,.1);background:rgba(255,255,255,.03);display:flex;align-items:center;justify-content:center;font-size:2.2rem;transition:border-color .4s,background .4s,box-shadow .4s}
#handIcon.detected{border-color:rgba(0,245,196,.6);background:rgba(0,245,196,.08);box-shadow:0 0 30px rgba(0,245,196,.2),inset 0 0 20px rgba(0,245,196,.05);animation:pulse 1.2s ease-in-out infinite}
@keyframes pulse{0%,100%{box-shadow:0 0 20px rgba(0,245,196,.2),inset 0 0 10px rgba(0,245,196,.04)}50%{box-shadow:0 0 50px rgba(0,245,196,.4),0 0 100px rgba(0,245,196,.08),inset 0 0 20px rgba(0,245,196,.08)}}
#handLabel{font-family:var(--mono);font-size:.65rem;letter-spacing:.2em;color:rgba(255,255,255,.25);text-transform:uppercase;transition:color .3s}
#handLabel.detected{color:rgba(0,245,196,.7)}
#cdRing{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);display:none;flex-direction:column;align-items:center;justify-content:center;pointer-events:none;z-index:40}
#cdBg{position:absolute;width:210px;height:210px;border-radius:50%;background:rgba(10,10,15,.75);backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,.06)}
#cdSvg{position:relative;z-index:2}
#cdN{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-family:var(--display);font-size:6rem;color:#fff;letter-spacing:.02em;z-index:3}
#cdHint{position:absolute;top:calc(50% + 120px);left:50%;transform:translateX(-50%);font-family:var(--mono);font-size:.62rem;letter-spacing:.2em;color:rgba(255,255,255,.3);text-transform:uppercase;white-space:nowrap;z-index:3}
#cancelHint{position:absolute;bottom:60px;left:50%;transform:translateX(-50%);font-family:var(--mono);font-size:.62rem;letter-spacing:.15em;color:rgba(255,45,120,.7);text-transform:uppercase;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap}
#cancelHint.show{opacity:1}
#flashEl{position:absolute;inset:0;background:#fff;opacity:0;pointer-events:none;z-index:50}
.hc{position:fixed;border-radius:50%;pointer-events:none;transform:translate(-50%,-50%);z-index:80;display:none;will-change:transform;transition:width .08s,height .08s,background .08s,box-shadow .08s}
#hc1{width:24px;height:24px;background:rgba(0,245,196,.15);border:2px solid var(--cyan);mix-blend-mode:screen;box-shadow:0 0 14px rgba(0,245,196,.4)}
#hc1.pinch{width:34px;height:34px;background:rgba(0,245,196,.4);box-shadow:0 0 32px rgba(0,245,196,.9),0 0 0 4px rgba(0,245,196,.2)}
#hc2{width:18px;height:18px;background:rgba(124,92,255,.15);border:1.5px solid var(--violet);mix-blend-mode:screen}
#puzzleScreen{z-index:30;background:var(--ink)}
#puzzleWrap{position:relative;width:min(88vmin,520px);height:min(88vmin,520px)}
#puzzleHUD{position:absolute;top:-52px;left:0;right:0;display:flex;justify-content:space-between;align-items:center}
#pzProg{font-family:var(--mono);font-size:.72rem;color:rgba(255,255,255,.3);letter-spacing:.08em}
#pzStatus{font-family:var(--mono);font-size:.72rem;color:var(--cyan);letter-spacing:.08em}
#pzBoard{position:absolute;inset:0;display:grid;grid-template-columns:repeat(4,1fr);grid-template-rows:repeat(3,1fr);gap:2px;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06);border-radius:3px;overflow:hidden}
.pCell{background:rgba(255,255,255,.015);border:1px solid rgba(255,255,255,.03);border-radius:1px;transition:background .12s,box-shadow .12s}
.pCell.hi{background:rgba(0,245,196,.09);box-shadow:inset 0 0 20px rgba(0,245,196,.15)}
.pCell.correct{background:rgba(0,230,118,.05)}
#piecesWrap{position:absolute;inset:0;pointer-events:none}
.piece{position:absolute;cursor:none;border-radius:2px;overflow:hidden;background:#111;will-change:transform;transition:box-shadow .15s}
.piece.sel{box-shadow:0 0 0 2px var(--cyan),0 0 30px rgba(0,245,196,.35)}
.piece.placed{transition:box-shadow .2s,left .18s,top .18s}
.piece canvas{display:block;width:100%;height:100%}
#pzTrackCanvas{position:absolute;inset:0;pointer-events:none;z-index:25;border-radius:3px}
#winScreen{position:fixed;inset:0;z-index:200;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;background:rgba(10,10,15,.96);opacity:0;pointer-events:none;transition:opacity .4s}
#winScreen.show{opacity:1;pointer-events:all}
#winScreen h2{font-family:var(--display);font-size:4.5rem;letter-spacing:.06em;background:linear-gradient(135deg,var(--cyan),var(--violet));-webkit-background-clip:text;-webkit-text-fill-color:transparent;animation:popIn .5s cubic-bezier(.34,1.56,.64,1)}
#winScreen p{font-family:var(--mono);font-size:.72rem;color:rgba(255,255,255,.35);letter-spacing:.12em}
@keyframes popIn{from{transform:scale(.3);opacity:0}to{transform:scale(1);opacity:1}}
#holoScreen{z-index:40;background:#000;overflow:hidden}
#holoBg{position:absolute;inset:0;background:radial-gradient(ellipse 90% 80% at 50% 50%,#050510 0%,#000 100%)}
#holoParticleCanvas{position:absolute;inset:0;pointer-events:none}
#holoStage{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;perspective:1000px;perspective-origin:50% 40%}
#holoWrap{position:relative;transform-style:preserve-3d;will-change:transform;filter:drop-shadow(0 40px 80px rgba(0,245,196,.15))}
#holoFrame{position:relative;transform-style:preserve-3d}
#holoImg{display:block;max-width:min(66vmin,440px);max-height:min(66vmin,440px);border-radius:3px;position:relative;z-index:2}
.hlayer{position:absolute;inset:0;border-radius:3px;pointer-events:none}
#hlR{mix-blend-mode:screen;filter:blur(.6px);background:rgba(255,0,50,.06)}
#hlG{mix-blend-mode:screen;filter:blur(.4px);background:rgba(0,255,120,.05)}
#hlB{mix-blend-mode:screen;filter:blur(.8px);background:rgba(0,80,255,.07)}
#hlScan{position:absolute;inset:0;border-radius:3px;pointer-events:none;overflow:hidden}
#hlScan::before{content:'';position:absolute;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,245,196,.018) 2px,rgba(0,245,196,.018) 3px)}
#hlScan::after{content:'';position:absolute;left:0;right:0;height:80px;background:linear-gradient(to bottom,transparent,rgba(0,245,196,.06),transparent);animation:scan 2.8s linear infinite;top:-80px}
@keyframes scan{to{top:calc(100% + 80px)}}
#hlEdge{position:absolute;inset:-2px;border-radius:5px;z-index:3;pointer-events:none;box-shadow:0 0 0 1px rgba(0,245,196,.18),0 0 16px rgba(0,245,196,.1),0 0 50px rgba(0,245,196,.05),inset 0 0 16px rgba(0,245,196,.03)}
.hcorner{position:absolute;width:16px;height:16px;pointer-events:none;z-index:5}
.hcorner::before,.hcorner::after{content:'';position:absolute;background:var(--cyan)}
.hcorner::before{width:100%;height:1px}
.hcorner::after{width:1px;height:100%}
.hcorner.tl{top:-4px;left:-4px}.hcorner.tl::before{top:0;left:0}.hcorner.tl::after{top:0;left:0}
.hcorner.tr{top:-4px;right:-4px}.hcorner.tr::before{top:0;right:0}.hcorner.tr::after{top:0;right:0}
.hcorner.bl{bottom:-4px;left:-4px}.hcorner.bl::before{bottom:0;left:0}.hcorner.bl::after{bottom:0;left:0}
.hcorner.br{bottom:-4px;right:-4px}.hcorner.br::before{bottom:0;right:0}.hcorner.br::after{bottom:0;right:0}
#hlSheen{position:absolute;inset:0;border-radius:3px;pointer-events:none;z-index:4;background:linear-gradient(118deg,rgba(255,255,255,.07) 0%,transparent 35%,transparent 65%,rgba(0,245,196,.04) 100%);animation:sheen 9s ease-in-out infinite}
@keyframes sheen{0%,100%{opacity:.5}50%{opacity:1}}
#hlReflect{position:absolute;top:100%;left:0;right:0;height:50%;border-radius:0 0 3px 3px;overflow:hidden;pointer-events:none;z-index:1;transform:scaleY(-1);opacity:0;mask-image:linear-gradient(to bottom,rgba(0,0,0,.25),transparent 75%);-webkit-mask-image:linear-gradient(to bottom,rgba(0,0,0,.25),transparent 75%);transition:opacity .4s}
#hlReflectImg{display:block;width:100%;height:auto;filter:blur(1.5px)}
#holoHUD{position:absolute;top:24px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.7);border:1px solid rgba(0,245,196,.12);border-radius:2px;padding:8px 22px;font-family:var(--mono);font-size:.65rem;color:rgba(0,245,196,.55);backdrop-filter:blur(10px);letter-spacing:.12em;text-transform:uppercase;z-index:10;pointer-events:none}
#holoData{position:absolute;bottom:24px;left:50%;transform:translateX(-50%);font-family:var(--mono);font-size:.62rem;letter-spacing:.12em;color:rgba(0,245,196,.35);text-align:center;text-transform:uppercase;line-height:2;pointer-events:none;z-index:10}
#holoHtCanvas{position:absolute;inset:0;pointer-events:none;z-index:8}
#restartBtn{position:absolute;bottom:60px;left:50%;transform:translateX(-50%);padding:10px 28px;border:1px solid rgba(255,255,255,.1);border-radius:2px;background:rgba(255,255,255,.03);color:rgba(255,255,255,.4);cursor:pointer;font-family:var(--mono);font-size:.68rem;letter-spacing:.14em;backdrop-filter:blur(10px);text-transform:uppercase;transition:all .25s;z-index:10}
#restartBtn:hover{border-color:rgba(0,245,196,.35);color:var(--cyan);background:rgba(0,245,196,.05)}
@keyframes glitchFlash{0%{opacity:0}10%{opacity:1}15%{opacity:.3}20%{opacity:.8}30%{opacity:0}}
.do-flash{animation:glitchFlash .35s forwards!important}
</style>
</head>
<body>
<div id="app">
  <div class="hc" id="hc1"></div>
  <div class="hc" id="hc2"></div>
  <video id="vid" playsinline autoplay muted></video>
  <canvas id="overlayCanvas"></canvas>
  <canvas id="trailCanvas"></canvas>
  <canvas id="photoCanvas"></canvas>
  <div class="screen" id="bootScreen">
    <canvas id="bootBgCanvas"></canvas>
    <div class="boot-logo"><h1>FOTO<br>FUZZLE</h1><span class="sub">Hand Tracking · AR Hologram</span></div>
    <div class="boot-status" id="bootStatus">Menginisialisasi kamera...</div>
    <div class="boot-bar"><div class="boot-bar-fill" id="bootBar"></div></div>
    <div class="boot-err" id="bootErr"></div>
  </div>
  <div class="screen off" id="cameraHud">
    <div class="corner tl" id="cTL"></div><div class="corner tr" id="cTR"></div>
    <div class="corner bl" id="cBL"></div><div class="corner br" id="cBR"></div>
    <div id="hudBadge">Tampilkan tangan ke kamera</div>
    <div id="handIndicator">
      <div id="handIcon">✋</div>
      <div id="handLabel">Belum terdeteksi</div>
    </div>
    <div id="cdRing">
      <div id="cdBg"></div>
      <svg id="cdSvg" width="210" height="210" viewBox="0 0 210 210">
        <circle cx="105" cy="105" r="92" fill="none" stroke="rgba(255,255,255,.05)" stroke-width="5"/>
        <circle id="cdArc" cx="105" cy="105" r="92" fill="none" stroke="url(#cg)" stroke-width="5" stroke-dasharray="578.1" stroke-dashoffset="578.1" stroke-linecap="round" style="transform-origin:center;transform:rotate(-90deg)"/>
        <defs><linearGradient id="cg" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" stop-color="#00f5c4"/><stop offset="100%" stop-color="#7c5cff"/></linearGradient></defs>
      </svg>
      <div id="cdN">5</div>
      <div id="cdHint">Tetap tampilkan tangan</div>
    </div>
    <div id="cancelHint">⚠ Tangan hilang — timer dibatalkan</div>
    <div id="flashEl"></div>
  </div>
  <div class="screen off" id="puzzleScreen">
    <div id="puzzleWrap">
      <div id="puzzleHUD">
        <span id="pzProg">0 / 12</span>
        <span id="pzStatus">Cubit &amp; geser keping</span>
      </div>
      <div id="pzBoard"></div>
      <div id="piecesWrap"></div>
      <canvas id="pzTrackCanvas"></canvas>
    </div>
  </div>
  <div class="screen off" id="holoScreen">
    <div id="holoBg"></div>
    <canvas id="holoParticleCanvas"></canvas>
    <div id="holoStage">
      <div id="holoWrap">
        <div id="holoFrame">
          <img id="holoImg" src="" alt="">
          <div class="hlayer" id="hlR"></div><div class="hlayer" id="hlG"></div><div class="hlayer" id="hlB"></div>
          <div id="hlScan"></div><div id="hlEdge"></div><div id="hlSheen"></div>
          <div class="hcorner tl"></div><div class="hcorner tr"></div>
          <div class="hcorner bl"></div><div class="hcorner br"></div>
          <div id="hlReflect"><img id="hlReflectImg" src="" alt=""></div>
        </div>
      </div>
    </div>
    <canvas id="holoHtCanvas"></canvas>
    <div id="holoHUD">Gerakkan tangan untuk memutar hologram</div>
    <div id="holoData">ROT X: 0° &nbsp;·&nbsp; ROT Y: 0°</div>
    <button id="restartBtn">↺ &nbsp;Foto Ulang</button>
  </div>
  <div id="winScreen"><h2>SELESAI!</h2><p>Merender hologram...</p></div>
</div>
<script>
// BOOT BG
(function(){
  const c=document.getElementById('bootBgCanvas'),ctx=c.getContext('2d');
  function sz(){c.width=innerWidth;c.height=innerHeight;}sz();window.addEventListener('resize',sz);
  const pts=Array.from({length:60},()=>({x:Math.random()*innerWidth,y:Math.random()*innerHeight,r:Math.random()*1.2+.3,vx:(Math.random()-.5)*.25,vy:(Math.random()-.5)*.25,o:Math.random()*.3+.05}));
  function draw(){
    c.width=c.width;
    pts.forEach(p=>{p.x+=p.vx;p.y+=p.vy;if(p.x<0)p.x=innerWidth;if(p.x>innerWidth)p.x=0;if(p.y<0)p.y=innerHeight;if(p.y>innerHeight)p.y=0;ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fillStyle='rgba(0,245,196,'+p.o+')';ctx.fill();});
    for(let i=0;i<pts.length;i++)for(let j=i+1;j<pts.length;j++){const d=Math.hypot(pts[i].x-pts[j].x,pts[i].y-pts[j].y);if(d<100){ctx.beginPath();ctx.moveTo(pts[i].x,pts[i].y);ctx.lineTo(pts[j].x,pts[j].y);ctx.strokeStyle='rgba(0,245,196,'+(0.1*(1-d/100))+')';ctx.lineWidth=.5;ctx.stroke();}}
    requestAnimationFrame(draw);
  }
  draw();
})();

// GLOBALS
const vid=document.getElementById('vid');
const overlayCanvas=document.getElementById('overlayCanvas'),oCtx=overlayCanvas.getContext('2d');
const trailCanvas=document.getElementById('trailCanvas'),tCtx=trailCanvas.getContext('2d');
const photoCanvas=document.getElementById('photoCanvas'),pCtx=photoCanvas.getContext('2d');

function resizeAll(){
  overlayCanvas.width=innerWidth;overlayCanvas.height=innerHeight;
  trailCanvas.width=innerWidth;trailCanvas.height=innerHeight;
  const pw=document.getElementById('puzzleWrap');
  if(pw){const ptc=document.getElementById('pzTrackCanvas');ptc.width=pw.offsetWidth;ptc.height=pw.offsetHeight;}
  document.getElementById('holoHtCanvas').width=innerWidth;document.getElementById('holoHtCanvas').height=innerHeight;
  document.getElementById('holoParticleCanvas').width=innerWidth;document.getElementById('holoParticleCanvas').height=innerHeight;
}
window.addEventListener('resize',resizeAll);resizeAll();

// === TUNING CONSTANTS ===
const SMOOTH      = 0.35;   // cursor lerp factor (lower=smoother/laggier, higher=snappier/jitterier)
const PINCH_ON    = 36;     // px: distance to START pinch (tight)
const PINCH_OFF   = 54;     // px: distance to END pinch (wider = hysteresis, avoids flicker)
const PINCH_ON_F  = 2;      // frames needed to confirm pinch start
const PINCH_OFF_F = 3;      // frames needed to confirm pinch release
const GRAB_R      = 90;     // px: grab radius around piece center
const COLS=4,ROWS=3,TOTAL=12,CD_MS=5000;

const ST={
  mode:'boot',hands:[],photoUrl:null,pieces:[],selPiece:null,placed:0,
  phase:'idle',cdStart:0,cdRAF:null,
  hRx:0,hRy:0,lastHand:null,handActive:false,trailPts:[],
  sx:0,sy:0,s2x:0,s2y:0,       // smoothed cursor positions
  pinchOn:false,pOnF:0,pOffF:0, // pinch state machine
  dox:0,doy:0,                  // drag offset (piece relative to finger)
};
let prevPinch=false;

// DOM
const bootStatus=document.getElementById('bootStatus'),bootBar=document.getElementById('bootBar'),bootErr=document.getElementById('bootErr');
const hudBadge=document.getElementById('hudBadge'),handIndicator=document.getElementById('handIndicator');
const handIcon=document.getElementById('handIcon'),handLabel=document.getElementById('handLabel');
const cdRing=document.getElementById('cdRing'),cdArc=document.getElementById('cdArc'),cdN=document.getElementById('cdN');
const flashEl=document.getElementById('flashEl'),cancelHint=document.getElementById('cancelHint');
const hc1=document.getElementById('hc1'),hc2=document.getElementById('hc2');
const corners=['cTL','cTR','cBL','cBR'].map(id=>document.getElementById(id));
const pzBoard=document.getElementById('pzBoard'),piecesWrap=document.getElementById('piecesWrap');
const pzProg=document.getElementById('pzProg'),pzStatus=document.getElementById('pzStatus');
const pzTrackCanvas=document.getElementById('pzTrackCanvas'),ptCtx=pzTrackCanvas.getContext('2d');
const holoImg=document.getElementById('holoImg'),hlReflectImg=document.getElementById('hlReflectImg');
const holoWrap=document.getElementById('holoWrap'),holoData=document.getElementById('holoData');
const holoHtCanvas=document.getElementById('holoHtCanvas'),htCtx=holoHtCanvas.getContext('2d');
const winScreen=document.getElementById('winScreen');

function showScreen(id){['bootScreen','cameraHud','puzzleScreen','holoScreen'].forEach(s=>document.getElementById(s).classList.toggle('off',s!==id));}

// CAMERA INIT
async function initCamera(){
  bootStatus.textContent='Meminta akses kamera...';bootBar.style.width='20%';
  try{
    const stream=await navigator.mediaDevices.getUserMedia({video:{width:{ideal:1280},height:{ideal:720},facingMode:'user'},audio:false});
    vid.srcObject=stream;await new Promise(r=>vid.onloadedmetadata=r);vid.play();vid.classList.add('live');
    bootStatus.textContent='Memuat model tangan...';bootBar.style.width='60%';
    initMediaPipe();
  }catch(e){bootErr.style.display='block';bootErr.textContent='Kamera tidak dapat diakses.\n'+e.message;bootStatus.textContent='Gagal';}
}

function initMediaPipe(){
  const hands=new Hands({locateFile:f=>'https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4.1646424915/'+f});
  hands.setOptions({
    maxNumHands:2,
    modelComplexity:1,            // FIX: was 0 → more accurate landmark detection
    minDetectionConfidence:.65,   // FIX: was .5 → fewer false detections
    minTrackingConfidence:.6,     // FIX: was .4 → more stable tracking
    selfieMode:true
  });
  hands.onResults(onResults);
  const cam=new Camera(vid,{onFrame:async()=>{if(ST.mode!=='boot') await hands.send({image:vid});},width:1280,height:720});
  cam.start().then(()=>{bootBar.style.width='100%';bootStatus.textContent='Siap!';setTimeout(()=>{ST.mode='camera';showScreen('cameraHud');},400);})
    .catch(e=>{bootErr.style.display='block';bootErr.textContent='MediaPipe gagal: '+e.message;});
}

// LANDMARK HELPERS
function sc(lm){return{x:lm.x*innerWidth,y:lm.y*innerHeight};}
function rawPinchPt(h){const t=sc(h[4]),i=sc(h[8]);return{x:(t.x+i.x)/2,y:(t.y+i.y)/2};}
function rawPinchDist(h){const t=sc(h[4]),i=sc(h[8]);return Math.hypot(t.x-i.x,t.y-i.y);}

// RESULTS — runs every MediaPipe frame
function onResults(res){
  ST.hands=res.multiHandLandmarks||[];

  if(ST.hands.length>0){
    const r=rawPinchPt(ST.hands[0]);
    // Init without lerp on first detection
    if(ST.sx===0&&ST.sy===0){ST.sx=r.x;ST.sy=r.y;}
    else{ST.sx+=(r.x-ST.sx)*SMOOTH;ST.sy+=(r.y-ST.sy)*SMOOTH;}

    // Pinch hysteresis state machine — prevents flicker
    const d=rawPinchDist(ST.hands[0]);
    if(!ST.pinchOn){
      if(d<PINCH_ON){ST.pOnF++;if(ST.pOnF>=PINCH_ON_F){ST.pinchOn=true;ST.pOnF=0;ST.pOffF=0;}}
      else{ST.pOnF=Math.max(0,ST.pOnF-1);}
    } else {
      if(d>PINCH_OFF){ST.pOffF++;if(ST.pOffF>=PINCH_OFF_F){ST.pinchOn=false;ST.pOffF=0;ST.pOnF=0;}}
      else{ST.pOffF=Math.max(0,ST.pOffF-1);}
    }
  } else {
    ST.sx=0;ST.sy=0;ST.pinchOn=false;ST.pOnF=0;ST.pOffF=0;
  }

  if(ST.hands.length>1){
    const r2=rawPinchPt(ST.hands[1]);
    if(ST.s2x===0&&ST.s2y===0){ST.s2x=r2.x;ST.s2y=r2.y;}
    else{ST.s2x+=(r2.x-ST.s2x)*SMOOTH;ST.s2y+=(r2.y-ST.s2y)*SMOOTH;}
  } else {ST.s2x=0;ST.s2y=0;}

  if(ST.mode==='camera') tickCamera();
  else if(ST.mode==='puzzle') tickPuzzle();
  else if(ST.mode==='hologram') tickHolo();
  drawOverlay();
}

// CAMERA MODE
function tickCamera(){
  if(!ST.hands.length){
    if(ST.phase==='countdown'){cancelCountdown();flashCancel();}
    resetHandUI();fadeTrail();return;
  }
  const pt={x:ST.sx,y:ST.sy};
  hc1.style.display='block';hc1.style.left=pt.x+'px';hc1.style.top=pt.y+'px';
  if(ST.hands.length>1){hc2.style.display='block';hc2.style.left=ST.s2x+'px';hc2.style.top=ST.s2y+'px';}
  else{hc2.style.display='none';}
  addTrail(pt);
  if(ST.phase==='idle'){
    setHandUI(true);ST.phase='countdown';ST.cdStart=performance.now();
    cdRing.style.display='flex';handIndicator.classList.add('hidden');
    hudBadge.textContent='Bersiap...';hudBadge.className='detected';
    cancelHint.classList.remove('show');corners.forEach(c=>c.classList.add('active'));
    tickCountdown();
  }
  if(ST.phase==='countdown') cancelHint.classList.remove('show');
}

function tickCountdown(){
  if(ST.phase!=='countdown') return;
  const frac=Math.min((performance.now()-ST.cdStart)/CD_MS,1);
  cdArc.style.strokeDashoffset=578.1*(1-frac);
  const rem=Math.max(1,Math.ceil(5*(1-frac)));
  cdN.textContent=rem;hudBadge.textContent='Foto dalam '+rem+'...';hudBadge.className='counting';
  if(frac>=1){takePhoto();return;}
  ST.cdRAF=requestAnimationFrame(tickCountdown);
}
function cancelCountdown(){
  if(ST.cdRAF){cancelAnimationFrame(ST.cdRAF);ST.cdRAF=null;}
  ST.phase='idle';cdRing.style.display='none';cdArc.style.strokeDashoffset=578.1;cdN.textContent='5';
  handIndicator.classList.remove('hidden');corners.forEach(c=>c.classList.remove('active'));
}
function flashCancel(){cancelHint.classList.add('show');setTimeout(()=>cancelHint.classList.remove('show'),2200);}
function resetHandUI(){setHandUI(false);hc1.style.display='none';hc2.style.display='none';hudBadge.textContent='Tampilkan tangan ke kamera';hudBadge.className='';}
function setHandUI(yes){handIcon.className=yes?'detected':'';handLabel.textContent=yes?'Tangan terdeteksi!':'Belum terdeteksi';handLabel.className=yes?'detected':'';}

// TRAIL
function addTrail(pt){
  ST.trailPts.push({...pt});if(ST.trailPts.length>35) ST.trailPts.shift();
  tCtx.clearRect(0,0,trailCanvas.width,trailCanvas.height);
  if(ST.trailPts.length<2) return;
  for(let i=1;i<ST.trailPts.length;i++){
    const a=(i/ST.trailPts.length)*0.55,w=1+(i/ST.trailPts.length)*2.5;
    tCtx.beginPath();tCtx.moveTo(ST.trailPts[i-1].x,ST.trailPts[i-1].y);tCtx.lineTo(ST.trailPts[i].x,ST.trailPts[i].y);
    tCtx.strokeStyle='rgba(0,245,196,'+a+')';tCtx.lineWidth=w;tCtx.lineCap='round';tCtx.stroke();
  }
}
function fadeTrail(){
  tCtx.globalCompositeOperation='destination-out';tCtx.fillStyle='rgba(0,0,0,0.15)';tCtx.fillRect(0,0,trailCanvas.width,trailCanvas.height);
  tCtx.globalCompositeOperation='source-over';if(ST.trailPts.length>0) ST.trailPts.shift();
}

// TAKE PHOTO
function takePhoto(){
  ST.phase='shot';cdRing.style.display='none';corners.forEach(c=>c.classList.remove('active'));
  flashEl.className='do-flash';setTimeout(()=>flashEl.className='',400);
  photoCanvas.width=vid.videoWidth||1280;photoCanvas.height=vid.videoHeight||720;
  pCtx.save();pCtx.translate(photoCanvas.width,0);pCtx.scale(-1,1);pCtx.drawImage(vid,0,0);pCtx.restore();
  ST.photoUrl=photoCanvas.toDataURL('image/jpeg',.93);
  tCtx.clearRect(0,0,trailCanvas.width,trailCanvas.height);ST.trailPts=[];
  setTimeout(goToPuzzle,600);
}

// PUZZLE
function goToPuzzle(){
  ST.mode='puzzle';showScreen('puzzleScreen');
  hc1.style.display='none';hc2.style.display='none';
  ST.pinchOn=false;ST.pOnF=0;ST.pOffF=0;ST.sx=0;ST.sy=0;prevPinch=false;
  ST.selPiece=null;ST.dox=0;ST.doy=0;
  setTimeout(()=>{resizeAll();buildPuzzle();},60);
}

function buildPuzzle(){
  pzBoard.innerHTML='';piecesWrap.innerHTML='';ST.pieces=[];ST.placed=0;ST.selPiece=null;
  const img=new Image();
  img.onload=()=>{
    const iw=img.width,ih=img.height,pw=iw/COLS,ph=ih/ROWS;
    const cont=document.getElementById('puzzleWrap');
    const bw=cont.offsetWidth,bh=cont.offsetHeight,cw=bw/COLS,ch=bh/ROWS;
    for(let r=0;r<ROWS;r++) for(let c=0;c<COLS;c++){const cell=document.createElement('div');cell.className='pCell';cell.dataset.r=r;cell.dataset.c=c;pzBoard.appendChild(cell);}
    const ids=[...Array(TOTAL).keys()];shuffle(ids);
    ids.forEach((id,i)=>{
      const cc=id%COLS,cr=Math.floor(id/COLS);
      const src=document.createElement('canvas');src.width=pw;src.height=ph;src.getContext('2d').drawImage(img,cc*pw,cr*ph,pw,ph,0,0,pw,ph);
      const el=document.createElement('div');el.className='piece';el.style.width=cw+'px';el.style.height=ch+'px';
      const dc=document.createElement('canvas');dc.width=cw;dc.height=ch;dc.getContext('2d').drawImage(src,0,0,pw,ph,0,0,cw,ch);el.appendChild(dc);
      const a=(i/TOTAL)*Math.PI*2;
      el.style.left=clamp(bw/2+Math.cos(a)*(bw*.58)-cw/2,0,bw-cw)+'px';
      el.style.top=clamp(bh/2+Math.sin(a)*(bh*.5)-ch/2,0,bh-ch)+'px';
      piecesWrap.appendChild(el);ST.pieces.push({id,cc,cr,placed:false,el,cw,ch});
    });
    pzProg.textContent='0 / '+TOTAL;
  };
  img.src=ST.photoUrl;
}

function tickPuzzle(){
  if(!ST.hands.length){releasePiece();prevPinch=false;return;}
  const cont=document.getElementById('puzzleWrap');
  const rect=cont.getBoundingClientRect();
  const bw=cont.offsetWidth,bh=cont.offsetHeight,cw=bw/COLS,ch=bh/ROWS;
  const mx=ST.sx,my=ST.sy;
  const lx=mx-rect.left,ly=my-rect.top;
  const pinching=ST.pinchOn;
  const justOn=pinching&&!prevPinch;
  const justOff=!pinching&&prevPinch;
  prevPinch=pinching;

  // Cursor visual
  hc1.style.display='block';hc1.style.left=mx+'px';hc1.style.top=my+'px';
  hc1.className='hc'+(pinching?' pinch':'');

  // Highlight cell
  document.querySelectorAll('.pCell').forEach(c=>c.classList.remove('hi'));
  if(ST.selPiece){
    const p=ST.selPiece;
    const pcx=parseFloat(p.el.style.left)+p.cw/2,pcy=parseFloat(p.el.style.top)+p.ch/2;
    const col=clamp(Math.floor(pcx/cw),0,COLS-1),row=clamp(Math.floor(pcy/ch),0,ROWS-1);
    const cell=pzBoard.querySelector('[data-r="'+row+'"][data-c="'+col+'"]');
    if(cell) cell.classList.add('hi');
  }

  // GRAB on pinch start
  if(justOn&&!ST.selPiece){
    let best=null,bestD=GRAB_R;
    ST.pieces.forEach(p=>{
      if(p.placed) return;
      const px=parseFloat(p.el.style.left)+p.cw/2,py=parseFloat(p.el.style.top)+p.ch/2;
      const d=Math.hypot(lx-px,ly-py);
      if(d<bestD){bestD=d;best=p;}
    });
    if(best){
      ST.selPiece=best;best.el.classList.add('sel');best.el.style.zIndex=999;
      // Store offset so piece doesn't snap/jump to finger
      ST.dox=lx-parseFloat(best.el.style.left);
      ST.doy=ly-parseFloat(best.el.style.top);
    }
  }

  // DRAG while pinching
  if(pinching&&ST.selPiece&&!ST.selPiece.placed){
    const p=ST.selPiece;
    p.el.style.left=clamp(lx-ST.dox,0,bw-p.cw)+'px';
    p.el.style.top=clamp(ly-ST.doy,0,bh-p.ch)+'px';
    pzStatus.textContent='Lepas di tempat yang tepat';
  }

  // RELEASE on pinch end
  if(justOff&&ST.selPiece){
    snapOrBounce();
    ST.selPiece=null;ST.dox=0;ST.doy=0;
    pzStatus.textContent='Cubit & geser keping';
  }

  if(ST.hands.length>1){hc2.style.display='block';hc2.style.left=ST.s2x+'px';hc2.style.top=ST.s2y+'px';}
  else{hc2.style.display='none';}

  ptCtx.clearRect(0,0,pzTrackCanvas.width,pzTrackCanvas.height);
  const rect2=document.getElementById('puzzleWrap').getBoundingClientRect();
  ST.hands.forEach((h,i)=>drawSkeleton(ptCtx,h,lm=>lm.x*innerWidth-rect2.left,lm=>lm.y*innerHeight-rect2.top,i===0?'0,245,196':'124,92,255',i===0?'52,211,153':'167,139,250'));
}

function snapOrBounce(){
  const p=ST.selPiece;if(!p) return;
  const cont=document.getElementById('puzzleWrap');
  const bw=cont.offsetWidth,bh=cont.offsetHeight,cw=bw/COLS,ch=bh/ROWS;
  const pcx=parseFloat(p.el.style.left)+p.cw/2,pcy=parseFloat(p.el.style.top)+p.ch/2;
  const sc2=clamp(Math.floor(pcx/cw),0,COLS-1),sr=clamp(Math.floor(pcy/ch),0,ROWS-1);
  if(sc2===p.cc&&sr===p.cr){
    const occ=ST.pieces.find(x=>x.placed&&x.cc===sc2&&x.cr===sr);
    if(!occ){
      p.placed=true;p.el.style.left=(sc2*cw)+'px';p.el.style.top=(sr*ch)+'px';
      p.el.style.zIndex=1;p.el.classList.remove('sel');p.el.classList.add('placed');
      const cell=pzBoard.querySelector('[data-r="'+sr+'"][data-c="'+sc2+'"]');
      if(cell) cell.classList.add('correct');
      ST.placed++;pzProg.textContent=ST.placed+' / '+TOTAL;
      if(ST.placed===TOTAL) setTimeout(onPuzzleDone,500);
    } else{bounce(p);}
  } else{bounce(p);}
}

function releasePiece(){
  if(ST.selPiece){
    ST.selPiece.el.classList.remove('sel');
    snapOrBounce();
    ST.selPiece=null;ST.dox=0;ST.doy=0;
  }
  hc1.style.display='none';
}

function bounce(p){
  p.el.style.transition='left .22s cubic-bezier(.34,1.56,.64,1),top .22s cubic-bezier(.34,1.56,.64,1)';
  setTimeout(()=>p.el.style.transition='',280);
}
function onPuzzleDone(){winScreen.classList.add('show');setTimeout(()=>{winScreen.classList.remove('show');goToHolo();},2000);}

// HOLOGRAM
let holoParRAF,holoIdleRAF;
function goToHolo(){
  ST.mode='hologram';showScreen('holoScreen');
  holoImg.src=ST.photoUrl;hlReflectImg.src=ST.photoUrl;
  document.getElementById('hlReflect').style.opacity='1';
  ST.hRx=0;ST.hRy=0;ST.lastHand=null;ST.handActive=false;
  ST.sx=0;ST.sy=0;ST.s2x=0;ST.s2y=0;
  hc1.style.display='none';hc2.style.display='none';
  resizeAll();startHoloParticles();holoIdle();
}
function startHoloParticles(){
  if(holoParRAF) cancelAnimationFrame(holoParRAF);
  const c=document.getElementById('holoParticleCanvas');c.width=innerWidth;c.height=innerHeight;
  const ctx=c.getContext('2d');
  const pts=Array.from({length:100},()=>({x:Math.random()*innerWidth,y:Math.random()*innerHeight,r:Math.random()*.9+.15,vx:(Math.random()-.5)*.12,vy:-Math.random()*.35-.05,o:Math.random()*.4+.08,color:Math.random()<.55?'0,245,196':'124,92,255'}));
  function draw(){c.width=c.width;pts.forEach(p=>{p.x+=p.vx;p.y+=p.vy;if(p.y<-4){p.y=innerHeight+4;p.x=Math.random()*innerWidth;}if(p.x<0)p.x=innerWidth;if(p.x>innerWidth)p.x=0;ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fillStyle='rgba('+p.color+','+p.o+')';ctx.fill();});holoParRAF=requestAnimationFrame(draw);}
  draw();
}
function holoIdle(){if(ST.mode!=='hologram') return;if(!ST.handActive){const t=Date.now()/1000;applyHolo(ST.hRx+Math.sin(t*.35)*2.5,ST.hRy+Math.cos(t*.28)*3.5);}holoIdleRAF=requestAnimationFrame(holoIdle);}
function applyHolo(rx,ry){
  holoWrap.style.transform='rotateX('+rx+'deg) rotateY('+ry+'deg)';
  const sx=ry*.05,sy=-rx*.04;
  document.getElementById('hlR').style.transform='translate('+(3+sx)+'px,'+(-1+sy)+'px)';
  document.getElementById('hlG').style.transform='translate('+(-2-sx*.5)+'px,'+(1+sy*.5)+'px)';
  document.getElementById('hlB').style.transform='translate('+(1+sx*.3)+'px,'+(2-sy)+'px)';
  holoData.textContent='ROT X: '+Math.round(rx)+'° · ROT Y: '+Math.round(ry)+'°';
  document.getElementById('hlReflect').style.opacity=Math.max(0,.3-Math.abs(rx)*.009);
}
function tickHolo(){
  if(!ST.hands.length){ST.lastHand=null;ST.handActive=false;hc1.style.display='none';hc2.style.display='none';htCtx.clearRect(0,0,holoHtCanvas.width,holoHtCanvas.height);return;}
  ST.handActive=true;
  if(ST.hands.length>=2){
    const mx=(ST.sx+ST.s2x)/2,my=(ST.sy+ST.s2y)/2;
    hc1.style.display='block';hc1.style.left=ST.sx+'px';hc1.style.top=ST.sy+'px';
    hc2.style.display='block';hc2.style.left=ST.s2x+'px';hc2.style.top=ST.s2y+'px';
    if(ST.lastHand&&ST.lastHand.two){ST.hRy=clamp(ST.hRy+(mx-ST.lastHand.x)*.55,-80,80);ST.hRx=clamp(ST.hRx-(my-ST.lastHand.y)*.55,-50,50);}
    ST.lastHand={x:mx,y:my,two:true};
  } else {
    hc1.style.display='block';hc1.style.left=ST.sx+'px';hc1.style.top=ST.sy+'px';hc2.style.display='none';
    if(ST.lastHand){ST.hRy=clamp(ST.hRy+(ST.sx-ST.lastHand.x)*.6,-80,80);ST.hRx=clamp(ST.hRx-(ST.sy-ST.lastHand.y)*.6,-50,50);}
    ST.lastHand={x:ST.sx,y:ST.sy,two:false};
  }
  applyHolo(ST.hRx,ST.hRy);
  htCtx.clearRect(0,0,holoHtCanvas.width,holoHtCanvas.height);
  ST.hands.forEach((h,i)=>drawSkeleton(htCtx,h,lm=>lm.x*innerWidth,lm=>lm.y*innerHeight,i===0?'0,245,196':'124,92,255',i===0?'52,211,153':'167,139,250'));
}

// SKELETON
const CONN=[[0,1],[1,2],[2,3],[3,4],[0,5],[5,6],[6,7],[7,8],[5,9],[9,10],[10,11],[11,12],[9,13],[13,14],[14,15],[15,16],[13,17],[17,18],[18,19],[19,20],[0,17]];
const TIPS=[4,8,12,16,20];
function drawSkeleton(ctx,hand,toX,toY,col1,col2){
  ctx.save();ctx.lineWidth=1.8;
  CONN.forEach(([a,b])=>{ctx.beginPath();ctx.moveTo(toX(hand[a]),toY(hand[a]));ctx.lineTo(toX(hand[b]),toY(hand[b]));ctx.strokeStyle='rgba('+col1+',.55)';ctx.stroke();});
  hand.forEach((lm,i)=>{const isTip=TIPS.includes(i);ctx.beginPath();ctx.arc(toX(lm),toY(lm),isTip?7:3.5,0,Math.PI*2);ctx.fillStyle=isTip?'rgba('+col2+',.95)':'rgba('+col1+',.8)';ctx.fill();if(isTip){ctx.strokeStyle='rgba('+col1+',.4)';ctx.lineWidth=1.5;ctx.stroke();}});
  ctx.restore();
}
function drawOverlay(){
  oCtx.clearRect(0,0,overlayCanvas.width,overlayCanvas.height);
  if(ST.mode!=='camera') return;
  ST.hands.forEach((h,i)=>drawSkeleton(oCtx,h,lm=>lm.x*innerWidth,lm=>lm.y*innerHeight,i===0?'0,245,196':'124,92,255',i===0?'52,211,153':'167,139,250'));
}

// UTILS
function clamp(v,mn,mx){return Math.max(mn,Math.min(mx,v));}
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=~~(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}}

document.getElementById('restartBtn').onclick=()=>{
  if(holoParRAF) cancelAnimationFrame(holoParRAF);
  if(holoIdleRAF) cancelAnimationFrame(holoIdleRAF);
  if(ST.cdRAF) cancelAnimationFrame(ST.cdRAF);
  Object.assign(ST,{mode:'camera',hands:[],photoUrl:null,lastHand:null,handActive:false,phase:'idle',cdRAF:null,trailPts:[],sx:0,sy:0,s2x:0,s2y:0,pinchOn:false,pOnF:0,pOffF:0,selPiece:null,dox:0,doy:0});
  prevPinch=false;
  holoWrap.style.transform='';showScreen('cameraHud');
  hc1.style.display='none';hc2.style.display='none';
  cdRing.style.display='none';cdArc.style.strokeDashoffset=578.1;cdN.textContent='5';
  handIndicator.classList.remove('hidden');corners.forEach(c=>c.classList.remove('active'));
  setHandUI(false);hudBadge.textContent='Tampilkan tangan ke kamera';hudBadge.className='';
  tCtx.clearRect(0,0,trailCanvas.width,trailCanvas.height);cancelHint.classList.remove('show');
};

initCamera();
</script>
